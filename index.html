
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relational databases 1</title>
  <link href="./styles.css" rel="stylesheet" />
</head>

<body>

  <h1>Reading and saving data from relational databases</h1>

<form name="editor">
  <table>
    <tbody>
      <tr>
        <td id="buttons">
          <div>
<h2>Import modules</h2>

<p>
  <input type="button" class="btn btn-module" value="create_engine" onclick="document.editor.textbox.value+='\nfrom sqlalchemy import create_engine'" />
  <input type="button" class="btn btn-module" value="numpy" onclick="document.editor.textbox.value+='\nimport numpy as np'" />
  <input type="button" class="btn btn-module" value="pandas" onclick="document.editor.textbox.value+='\nimport pandas as pd'" />
  <input type="button" class="btn btn-module" value="sqlite3" onclick="document.editor.textbox.value+='\nimport sqlite3'" />
  <input type="button" class="btn btn-module" value="version" onclick="document.editor.textbox.value+='\nprint(np.__version__)'" />
</p>

<hr />
<h2>Read data from SQL database</h2>

<p>
  <input class="btn" name="databasePython" id="databasePython" placeholder="database" type="textfield" />
  <input class="btn" name="tablePython" id="tablePython" placeholder="table" type="textfield" />
</p>

<p>
  <input type="button" class="btn btn-success" value="connect" onclick="connect();" />
  <input type="button" class="btn btn-success" value="cursor" onclick="cursor();" />
</p>

<hr />
<h2>Using pandas read_sql method</h2>

<p>
  <input class="btn" name="databasePandas" id="databasePandas" placeholder="database" type="textfield" />
  <input class="btn" name="tablePandas" id="tablePandas" placeholder="table" type="textfield" />
</p>

<p>
  <input class="btn" name="index" id="index" placeholder="index" type="textfield" />
  <input class="btn" name="dates" id="dates" placeholder="dates" type="textfield" />
</p>

<p>
  <input type="button" class="btn btn-success" value="read_sql()" onclick="readSql(this.value);" />
  <input type="button" class="btn btn-success" value="read_sql_query()" onclick="readSql(this.value);" />
  <input type="button" class="btn btn-success" value="read_sql_table()" onclick="readSql(this.value);" />
</p>

<hr />
<h2>Data at a glance</h2>

<p>
  <input type="button" class="btn btn-data" value="describe()" onclick="data(this.value);" />
  <input type="button" class="btn btn-data" value="head()" onclick="data(this.value);" />
  <input type="button" class="btn btn-data" value="info()" onclick="data(this.value);" />
  <input type="button" class="btn btn-data" value="foot()" onclick="data(this.value);" />
  <input type="button" class="btn btn-data" value="shape" onclick="data(this.value);" />
</p>

<hr />
<h2>Data cleaning</h2>

<p>
  <input class="btn" name="column" id="column" placeholder="column" type="textfield" />
</p>

<p>
  <input type="button" class="btn btn-success" value="isna()" onclick="isna(this.value);" />
</p>

<hr />
<h2>Numerical analysis</h2>

<p>
  <input type="button" class="btn btn-success" value="kurt()" onclick="stats(this.value);" />
  <input type="button" class="btn btn-success" value="mean()" onclick="stats(this.value);" />
  <input type="button" class="btn btn-success" value="median()" onclick="stats(this.value);" />
  <input type="button" class="btn btn-success" value="mode()" onclick="stats(this.value);" />
  <input type="button" class="btn btn-success" value="skew()" onclick="stats(this.value);" />
</p>

<hr />
<h2>Boolean arrays (masks)</h2>

<p>
  <input type="button" class="btn btn-primary" value=">" onclick="boolean(this.value);" />
  <input type="button" class="btn btn-primary" value=">=" onclick="boolean(this.value);" />
  <input type="button" class="btn btn-primary" value="<" onclick="boolean(this.value);" />
  <input type="button" class="btn btn-primary" value="<=" onclick="boolean(this.value);" />
  <input type="button" class="btn btn-primary" value="==" onclick="boolean(this.value);" />
  <input type="button" class="btn btn-primary" value="!=" onclick="boolean(this.value);" />
</p>

<p>
  <input class="btn" name="value" id="value" placeholder="value" type="textfield" />
</p>

<hr />
<h2>astype</h2>

<p>
  <input type="button" class="btn btn-success" value="astype()" onclick="asType();" />
  <input class="btn" name="type" id="type" placeholder="type" type="textfield" />
</p>

<hr />
<h2>Create tables from DataFrame objects</h2>

<p>
  <input type="button" class="btn btn-success" value="to_sql()" onclick="saveSql(this.value);" />
</p>

          </div>
        </td>
        <td id="textbox">
          <textarea id="preview" name="textbox"></textarea>
        </td>
        <td id="empty"></td>
      </tr>
    </tbody>
  </table>
</form>

  <script src="./script.js"></script>
</body>
</html>
